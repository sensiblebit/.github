repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.11
    hooks:
      - id: actionlint
        files: ^\.github/workflows/.*\.ya?ml$

  - repo: local
    hooks:
      - id: python-compile
        name: python compile
        entry: bash -c 'tmp=$(mktemp); python3 -c '"'"'import py_compile, sys; py_compile.compile("scripts/checks.py", cfile=sys.argv[1], doraise=True)'"'"' "$tmp"; rm -f "$tmp"'
        language: system
        files: ^scripts/.*\.py$
        pass_filenames: false
